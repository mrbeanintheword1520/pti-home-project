@if (isOpen()) {
  <div class="lead-popup-backdrop">
    <section class="lead-popup" role="dialog" aria-modal="true" aria-labelledby="lead-popup-title">
      <button type="button" class="lead-popup__close" (click)="close()" aria-label="Đóng popup">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 5l12 12M17 5L5 17" />
        </svg>
      </button>

      <div class="lead-popup__visual">
        <img src="/homepage/popup.jpg" alt="Thông tin dự án PTI Home" />
      </div>

      <form class="lead-form" (ngSubmit)="submit()">
        <h2 id="lead-popup-title">Nhận thông tin dự án</h2>
        <ul class="lead-form__benefits">
          <li>
            <span>✓</span>
            Căn hộ cao cấp nhiều diện tích
          </li>
          <li>
            <span>✓</span>
            Chính sách ưu đãi hấp dẫn
          </li>
          <li>
            <span>✓</span>
            Hỗ trợ tư vấn nhanh chóng
          </li>
        </ul>

        <div class="lead-form__divider"></div>

        <label class="lead-field">
          <span>Họ và tên</span>
          <div class="lead-input">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6">
              <circle cx="9" cy="5" r="3" />
              <path d="M3 16c0-3 2.5-5 6-5s6 2 6 5" />
            </svg>
            <input type="text" name="name" [(ngModel)]="name" placeholder="Vui lòng nhập họ và tên" />
          </div>
        </label>

        <label class="lead-field">
          <span>Email</span>
          <div class="lead-input">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M3 5h12v9H3z" />
              <path d="M3 5l6 5 6-5" />
            </svg>
            <input type="email" name="email" [(ngModel)]="email" placeholder="Nhập Email (Không bắt buộc)" />
          </div>
        </label>

        <label class="lead-field">
          <span>Số điện thoại*</span>
          <div class="lead-input" [class.lead-input--error]="submitted && !phone.trim()">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M5 3l2 4-2 1c1 2 3 4 5 5l1-2 4 2-1 3c-6 0-12-6-12-12l3-1z" />
            </svg>
            <input type="tel" name="phone" [(ngModel)]="phone" placeholder="Vui lòng nhập số điện thoại" required />
          </div>
          @if (submitted && !phone.trim()) {
            <small>Vui lòng nhập số điện thoại để nhận thông tin dự án.</small>
          }
        </label>

        <label class="lead-field">
          <span>Nhu cầu quan tâm</span>
          <div class="lead-input lead-input--select">
            <select name="interest" [(ngModel)]="interest">
              <option value="">Chọn loại sản phẩm</option>
              @for (option of interestOptions; track option) {
                <option [value]="option">{{ option }}</option>
              }
            </select>
          </div>
        </label>

        <button type="submit" class="lead-form__submit">Nhận thông tin</button>

        <p class="lead-form__privacy">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M7 1.5l4 1.5v3c0 3-1.8 5.3-4 6.5-2.2-1.2-4-3.5-4-6.5V3l4-1.5z" />
          </svg>
          Thông tin của bạn được bảo mật và chỉ dùng để tư vấn dự án.
        </p>
      </form>
    </section>
  </div>
}
