@if (modalService.isOpen()) {
  <div class="cpm-overlay" (click)="close()">
    <div class="cpm-modal" (click)="$event.stopPropagation()">
      <button class="cpm-close" (click)="close()" aria-label="Đóng">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>

      <div class="cpm-content">
        <div class="cpm-header">
          <div class="cpm-header__icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <h2 class="cpm-title">Thông Tin Cá Nhân</h2>
          <p class="cpm-subtitle">Xem và cập nhật thông tin tài khoản của bạn để nhận hỗ trợ tốt nhất.</p>
        </div>

        @if (successMessage) {
          <div class="cpm-alert cpm-alert--success">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"/></svg>
            <span>{{ successMessage }}</span>
          </div>
        }

        @if (errorMessage) {
          <div class="cpm-alert cpm-alert--error">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"/></svg>
            <span>{{ errorMessage }}</span>
          </div>
        }

        <form class="cpm-form" (submit)="onSubmit($event)">
          <div class="cpm-grid">
            <!-- Số điện thoại (locked) -->
            <div class="cpm-field cpm-field--disabled">
              <label class="cpm-label">Số điện thoại (ID tài khoản)</label>
              <div class="cpm-input-wrapper">
                <span class="cpm-input-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
                <input type="text" [value]="phone" disabled class="cpm-input" />
              </div>
              <span class="cpm-hint">Số điện thoại dùng làm định danh và không thể thay đổi.</span>
            </div>

            <!-- Họ và tên -->
            <div class="cpm-field">
              <label class="cpm-label">Họ và tên <span class="required">*</span></label>
              <div class="cpm-input-wrapper">
                <span class="cpm-input-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </span>
                <input type="text" [(ngModel)]="name" name="name" placeholder="Nhập họ và tên..." class="cpm-input" required />
              </div>
            </div>

            <!-- Email -->
            <div class="cpm-field">
              <label class="cpm-label">Email</label>
              <div class="cpm-input-wrapper">
                <span class="cpm-input-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </span>
                <input type="email" [(ngModel)]="email" name="email" placeholder="VD: nguyen@example.com..." class="cpm-input" />
              </div>
            </div>

            <!-- Địa chỉ -->
            <div class="cpm-field">
              <label class="cpm-label">Địa chỉ</label>
              <div class="cpm-input-wrapper">
                <span class="cpm-input-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 0 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>
                </span>
                <input type="text" [(ngModel)]="address" name="address" placeholder="VD: Quận 1, TP.HCM..." class="cpm-input" />
              </div>
            </div>

            <!-- Dự án quan tâm -->
            <div class="cpm-field">
              <label class="cpm-label">Dự án quan tâm</label>
              <div class="cpm-input-wrapper">
                <span class="cpm-input-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M3 7v14M21 7v14M12 3L3 7h18l-9-4z"/></svg>
                </span>
                <select [(ngModel)]="interest" name="interest" class="cpm-select">
                  <option value="">Chọn dự án...</option>
                  @for (proj of allProjects; track proj) {
                    <option [value]="proj">{{ proj }}</option>
                  }
                </select>
              </div>
            </div>

            <!-- Ngân sách -->
            <div class="cpm-field">
              <label class="cpm-label">Ngân sách dự kiến</label>
              <div class="cpm-input-wrapper">
                <span class="cpm-input-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </span>
                <select [(ngModel)]="budget" name="budget" class="cpm-select">
                  <option value="">Chọn ngân sách...</option>
                  @for (bg of budgetOptions; track bg) {
                    <option [value]="bg">{{ bg }}</option>
                  }
                </select>
              </div>
            </div>
          </div>

          <div class="cpm-actions">
            <button type="button" class="btn-cpm btn-cpm--cancel" (click)="close()">Hủy</button>
            <button type="submit" class="btn-cpm btn-cpm--submit">Cập nhật</button>
          </div>
        </form>
      </div>
    </div>
  </div>
}
