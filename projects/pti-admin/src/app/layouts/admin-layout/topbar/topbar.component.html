<div class="topbar-container">
  <!-- Left: Hamburger Menu Icon -->
  <div class="topbar-left">
    <button class="toggle-btn" aria-label="Toggle Sidebar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <!-- Search Input -->
    <div class="search-box">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" placeholder="Tìm kiếm khách hàng, dự án..." class="search-input" />
    </div>
  </div>

  <!-- Right: Notifications & Profile -->
  <div class="topbar-right">
    <!-- Notification Bell -->
    <div class="notification-wrapper">
      <button class="notification-btn" aria-label="Notifications">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="notification-badge">12</span>
      </button>
    </div>

    <!-- User Profile -->
    <div class="profile-wrapper">
      <img src="https://ui-avatars.com/api/?name=Nguyen+Van+A&background=f1f5f9&color=0f172a&rounded=true" alt="Admin Avatar" class="profile-avatar" />
      <div class="profile-info">
        <span class="profile-name">Nguyễn Văn A</span>
        <span class="profile-role">Admin</span>
      </div>
    </div>
  </div>
</div>
